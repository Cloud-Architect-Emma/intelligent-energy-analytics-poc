<svg viewBox="0 0 900 580" xmlns="http://www.w3.org/2000/svg" font-family="Inter,system-ui,sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6366f1"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="580" fill="#0f172a" rx="12"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">Intelligent Energy Analytics — Architecture</text>
  <text x="450" y="56" text-anchor="middle" font-size="12" fill="#64748b">Python · Flask · SQLite · scipy · scikit-learn</text>

  <!-- ── Row 1: Entry points ── -->
  <rect x="60" y="90" width="140" height="52" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="130" y="111" text-anchor="middle" font-size="11" font-weight="600" fill="#a5b4fc">HTTP CLIENT</text>
  <text x="130" y="129" text-anchor="middle" font-size="10" fill="#64748b">curl / browser / app</text>

  <rect x="380" y="90" width="140" height="52" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="450" y="111" text-anchor="middle" font-size="11" font-weight="600" fill="#a5b4fc">DASHBOARD UI</text>
  <text x="450" y="129" text-anchor="middle" font-size="10" fill="#64748b">Flask + HTML/JS</text>

  <rect x="700" y="90" width="140" height="52" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="770" y="111" text-anchor="middle" font-size="11" font-weight="600" fill="#a5b4fc">BATCH RUNNER</text>
  <text x="770" y="129" text-anchor="middle" font-size="10" fill="#64748b">POST /predict</text>

  <!-- Arrows row1 → row2 -->
  <line x1="130" y1="142" x2="300" y2="192" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="450" y1="142" x2="450" y2="192" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="770" y1="142" x2="600" y2="192" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Row 2: Flask API ── -->
  <rect x="220" y="192" width="460" height="64" rx="8" fill="#1e1b4b" stroke="#818cf8" stroke-width="1.5"/>
  <text x="450" y="216" text-anchor="middle" font-size="12" font-weight="700" fill="#c7d2fe">FLASK REST API  ·  app.py</text>
  <text x="295" y="238" text-anchor="middle" font-size="10" fill="#818cf8">POST /ingest</text>
  <text x="400" y="238" text-anchor="middle" font-size="10" fill="#818cf8">POST /predict</text>
  <text x="505" y="238" text-anchor="middle" font-size="10" fill="#818cf8">GET /records</text>
  <text x="605" y="238" text-anchor="middle" font-size="10" fill="#818cf8">GET /health</text>

  <!-- Arrow row2 → row3 left -->
  <line x1="340" y1="256" x2="220" y2="310" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Arrow row2 → row3 right -->
  <line x1="560" y1="256" x2="680" y2="310" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Row 3: Processing modules ── -->
  <rect x="60" y="310" width="300" height="80" rx="8" fill="#1e293b" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="210" y="333" text-anchor="middle" font-size="12" font-weight="700" fill="#67e8f9">INGESTION PIPELINE  ·  ingest.py</text>
  <text x="210" y="353" text-anchor="middle" font-size="10" fill="#64748b">snake_case normalisation</text>
  <text x="210" y="368" text-anchor="middle" font-size="10" fill="#64748b">type coercion · tier canonicalisation</text>
  <text x="210" y="383" text-anchor="middle" font-size="10" fill="#64748b">required field validation · UUID stamping</text>

  <rect x="540" y="310" width="300" height="80" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="690" y="333" text-anchor="middle" font-size="12" font-weight="700" fill="#c4b5fd">AI ENGINE  ·  predict.py</text>
  <text x="690" y="353" text-anchor="middle" font-size="10" fill="#64748b">Stage A: scipy.stats.linregress</text>
  <text x="690" y="368" text-anchor="middle" font-size="10" fill="#64748b">Stage B: sklearn RandomForest</text>
  <text x="690" y="383" text-anchor="middle" font-size="10" fill="#64748b">trend · tier · confidence · recommendation</text>

  <!-- Arrows row3 → row4 -->
  <line x1="210" y1="390" x2="390" y2="438" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="690" y1="390" x2="510" y2="438" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Row 4: Data store ── -->
  <rect x="220" y="438" width="460" height="64" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="450" y="462" text-anchor="middle" font-size="12" font-weight="700" fill="#6ee7b7">DATA WAREHOUSE  ·  store.py (SQLite)</text>
  <text x="290" y="485" text-anchor="middle" font-size="10" fill="#64748b">PK: customer_id</text>
  <text x="450" y="485" text-anchor="middle" font-size="10" fill="#64748b">SK: timestamp</text>
  <text x="610" y="485" text-anchor="middle" font-size="10" fill="#64748b">mirrors DynamoDB schema</text>

  <!-- ── Cross-cutting labels ── -->
  <rect x="20" y="510" width="860" height="55" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="450" y="530" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8">CROSS-CUTTING CONCERNS</text>
  <text x="120" y="552" text-anchor="middle" font-size="10" fill="#64748b">🔒 Input Validation</text>
  <text x="270" y="552" text-anchor="middle" font-size="10" fill="#64748b">📋 Pipeline Audit Log</text>
  <text x="420" y="552" text-anchor="middle" font-size="10" fill="#64748b">♻️ Idempotent Writes</text>
  <text x="580" y="552" text-anchor="middle" font-size="10" fill="#64748b">📊 GitHub Actions CI</text>
  <text x="750" y="552" text-anchor="middle" font-size="10" fill="#64748b">🚀 Render / Railway Deploy</text>
</svg>
