name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest tests/ -v

      - name: Health check
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from src.store import initialise, seed_sample_data, count_records, scan_all
          from src.predict import run_batch
          initialise()
          seed_sample_data()
          records = scan_all()
          report = run_batch(records)
          assert report['report_metadata']['total_customers'] == 3
          assert report['report_metadata']['total_records'] == 18
          print('All checks passed.')
          "
